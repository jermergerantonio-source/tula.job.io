<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rompecabezas</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --panel: #12121a;
    --accent: #e8ff45;
    --accent2: #ff4d6d;
    --accent3: #4dffb8;
    --text: #f0f0f0;
    --muted: #555;
    --border: #222230;
    --glow: 0 0 20px rgba(232,255,69,0.25);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    overflow-x: hidden;
  }

  body::before {
    content:'';
    position:fixed;
    top:-50%;left:-50%;
    width:200%;height:200%;
    background: radial-gradient(ellipse at 70% 20%, rgba(232,255,69,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 80%, rgba(77,255,184,0.04) 0%, transparent 50%);
    pointer-events:none;
    z-index:0;
  }

  header {
    text-align:center;
    margin-bottom: 28px;
    position:relative;
    z-index:1;
  }

  header h1 {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  header h1 span { color: var(--accent); }

  header p {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 24px;
    position:relative;
    z-index:1;
  }

  .ctrl-group {
    display:flex;
    align-items:center;
    gap:8px;
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 6px;
  }
  .ctrl-group label {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .ctrl-group select {
    background: transparent;
    border: none;
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    cursor: pointer;
    outline:none;
  }
  .ctrl-group select option { background: #1a1a26; }

  .btn {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    padding: 10px 22px;
    border-radius: 6px;
    transition: all 0.2s ease;
  }
  .btn-primary {
    background: var(--accent);
    color: #0a0a0f;
  }
  .btn-primary:hover {
    background: #fff;
    box-shadow: var(--glow);
    transform: translateY(-2px);
  }
  .btn-secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-2px);
  }

  .stats {
    display:flex;
    gap: 24px;
    margin-bottom: 20px;
    position:relative;
    z-index:1;
  }
  .stat {
    text-align:center;
  }
  .stat-val {
    font-family: 'Space Mono', monospace;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent);
    line-height:1;
  }
  .stat-label {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 3px;
  }

  .game-area {
    position:relative;
    z-index:1;
    display:flex;
    gap:24px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
  }

  .board-wrapper {
    position:relative;
  }

  #puzzle-board {
    display: grid;
    gap: 3px;
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 12px;
    border-radius: 10px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    position:relative;
  }

  .tile {
    width: var(--tile-size);
    height: var(--tile-size);
    border-radius: 4px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    user-select: none;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .tile:hover:not(.empty) {
    transform: scale(1.04);
    box-shadow: 0 4px 20px rgba(232,255,69,0.3);
    z-index: 2;
  }

  .tile.selected {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(232,255,69,0.5);
    z-index: 3;
  }

  .tile.hint-move {
    outline: 2px solid var(--accent3);
    animation: pulse-hint 0.6s ease 2;
  }

  @keyframes pulse-hint {
    0%,100% { box-shadow: 0 0 0 rgba(77,255,184,0); }
    50% { box-shadow: 0 0 16px rgba(77,255,184,0.5); }
  }

  .tile.empty {
    background: var(--bg) !important;
    cursor: default;
    border-color: transparent;
  }

  .tile-num {
    position:absolute;
    bottom: 3px;
    right: 5px;
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: rgba(255,255,255,0.35);
    line-height:1;
  }

  .tile.correct-pos {
    border-color: rgba(77,255,184,0.3) !important;
  }

  .sidebar {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    width: 180px;
    flex-shrink: 0;
  }
  .sidebar h3 {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 14px;
    font-family: 'Space Mono', monospace;
  }

  #preview-canvas {
    width: 100%;
    border-radius: 5px;
    margin-bottom: 14px;
    border: 1px solid var(--border);
  }

  .progress-bar {
    background: var(--bg);
    border-radius: 4px;
    height: 6px;
    overflow:hidden;
    margin-bottom: 6px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent3), var(--accent));
    border-radius: 4px;
    transition: width 0.4s ease;
  }
  .progress-text {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    text-align: right;
  }

  .hint-btn-wrap { margin-top: 14px; }

  .win-overlay {
    display:none;
    position: fixed;
    inset:0;
    background: rgba(10,10,15,0.92);
    z-index: 100;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:16px;
  }
  .win-overlay.show { display:flex; }
  .win-box {
    background: var(--panel);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 40px 48px;
    text-align:center;
    animation: pop-in 0.4s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: var(--glow), 0 20px 60px rgba(0,0,0,0.8);
  }
  @keyframes pop-in {
    from { transform: scale(0.7); opacity:0; }
    to { transform: scale(1); opacity:1; }
  }
  .win-box h2 {
    font-size: 2.5rem;
    font-weight:800;
    color: var(--accent);
    margin-bottom:8px;
  }
  .win-box p {
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    margin-bottom:24px;
  }
  .win-stats {
    display:flex;
    gap:28px;
    justify-content:center;
    margin-bottom:28px;
  }

  .confetti-piece {
    position:fixed;
    width:8px;
    height:8px;
    border-radius:2px;
    pointer-events:none;
    z-index:200;
    animation: fall linear forwards;
  }
  @keyframes fall {
    from { transform: translateY(-20px) rotate(0deg); opacity:1; }
    to { transform: translateY(110vh) rotate(720deg); opacity:0; }
  }

  .move-anim {
    animation: slide-pop 0.15s ease;
  }
  @keyframes slide-pop {
    0% { transform: scale(0.92); }
    60% { transform: scale(1.04); }
    100% { transform: scale(1); }
  }

  /* ── Math Challenge Modal ── */
  .math-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,10,15,0.88);
    z-index: 150;
    align-items: center;
    justify-content: center;
  }
  .math-overlay.show { display: flex; }

  .math-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 36px 40px;
    text-align: center;
    max-width: 380px;
    width: 90%;
    animation: pop-in 0.3s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  }

  .math-badge {
    display: inline-block;
    background: var(--accent);
    color: #0a0a0f;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 16px;
  }

  .math-question {
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.2;
  }

  .math-num {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .math-input {
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 8px;
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 1.4rem;
    font-weight: 700;
    text-align: center;
    width: 100%;
    padding: 12px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 14px;
  }
  .math-input:focus { border-color: var(--accent); }
  .math-input.shake {
    animation: shake 0.4s ease;
    border-color: var(--accent2) !important;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  .math-feedback {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    min-height: 18px;
    margin-bottom: 14px;
    transition: color 0.2s;
  }
  .math-feedback.wrong { color: var(--accent2); }
  .math-feedback.right { color: var(--accent3); }

  .math-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  .math-attempts {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 16px;
  }
  .attempt-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.2s;
  }
  .attempt-dot.used { background: var(--accent2); }

  .math-progress-wrap {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 22px;
    overflow: hidden;
  }
  .math-progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent3), var(--accent));
    transition: width 0.5s ease;
  }
</style>
</head>
<body>

<header>
  <h1>ROMPE<span>CABEZAS</span></h1>
  <p>Puzzle generado aleatoriamente</p>
</header>

<div class="controls">
  <div class="ctrl-group">
    <label>Tema</label>
    <select id="theme-sel">
      <option value="gradient">Degradado</option>
      <option value="geometric">Geométrico</option>
      <option value="neon">Neón</option>
      <option value="mosaic">Mosaico</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>Tamaño</label>
    <select id="size-sel">
      <option value="3">3×3 (Fácil)</option>
      <option value="4" selected>4×4 (Normal)</option>
      <option value="5">5×5 (Difícil)</option>
      <option value="6">6×6 (Experto)</option>
    </select>
  </div>
  <button class="btn btn-primary" onclick="initPuzzle()">▶ Nuevo Juego</button>
  <button class="btn btn-secondary" onclick="shufflePuzzle()">⟳ Mezclar</button>
</div>

<div class="stats">
  <div class="stat"><div class="stat-val" id="moves-val">0</div><div class="stat-label">Movimientos</div></div>
  <div class="stat"><div class="stat-val" id="time-val">00:00</div><div class="stat-label">Tiempo</div></div>
  <div class="stat"><div class="stat-val" id="correct-val">0%</div><div class="stat-label">Correcto</div></div>
</div>

<div class="game-area">
  <div class="board-wrapper">
    <div id="puzzle-board"></div>
  </div>
  <div class="sidebar">
    <h3>Vista Previa</h3>
    <canvas id="preview-canvas" width="156" height="156"></canvas>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-text" id="progress-text">0 / 0</div>
    <div class="hint-btn-wrap">
      <button class="btn btn-secondary" style="width:100%;font-size:0.75rem;padding:8px" onclick="giveHint()">💡 Pista</button>
    </div>
  </div>
</div>

<!-- Math Challenge Modal -->
<div class="math-overlay" id="math-overlay">
  <div class="math-box">
    <div class="math-badge">⚡ Desafío matemático</div>
    <div class="math-progress-wrap">
      <div class="math-progress-bar" id="math-prog-bar" style="width:0%"></div>
    </div>
    <div class="math-question" id="math-question">¿Cuánto es 5 + 3?</div>
    <div class="math-num" id="math-num">Pregunta 1 de 20</div>
    <div class="math-attempts" id="math-attempts">
      <div class="attempt-dot"></div>
      <div class="attempt-dot"></div>
      <div class="attempt-dot"></div>
    </div>
    <input class="math-input" id="math-input" type="number" placeholder="Tu respuesta..." autocomplete="off" />
    <div class="math-feedback" id="math-feedback"></div>
    <div class="math-actions">
      <button class="btn btn-primary" onclick="checkMath()">Confirmar ✓</button>
      <button class="btn btn-secondary" onclick="cancelMath()">Cancelar</button>
    </div>
  </div>
</div>

<div class="win-overlay" id="win-overlay">
  <div class="win-box">
    <h2>¡RESUELTO!</h2>
    <p>Completaste el rompecabezas</p>
    <div class="win-stats">
      <div class="stat"><div class="stat-val" id="win-moves">0</div><div class="stat-label">Movimientos</div></div>
      <div class="stat"><div class="stat-val" id="win-time">0:00</div><div class="stat-label">Tiempo</div></div>
    </div>
    <button class="btn btn-primary" onclick="initPuzzle(); document.getElementById('win-overlay').classList.remove('show')">Jugar de nuevo</button>
  </div>
</div>

<script>
let N = 4;
let tiles = [];
let emptyIdx = 0;
let moves = 0;
let startTime = null;
let timerInterval = null;
let selectedIdx = -1;
let imgData = null; // canvas image data per tile
let solved = false;

const TILE_SIZES = { 3: 110, 4: 85, 5: 70, 6: 58 };

// ─── Image generation ───────────────────────────────────────────────
function generateImage(theme, size) {
  const canvas = document.createElement('canvas');
  const total = size * 100;
  canvas.width = total; canvas.height = total;
  const ctx = canvas.getContext('2d');

  if (theme === 'gradient') {
    const palette = [
      ['#e8ff45','#ff4d6d','#4dffb8'],
      ['#ff6b35','#f7c59f','#efefd0'],
      ['#5b2d8e','#e040fb','#00e5ff'],
      ['#1a1a2e','#16213e','#0f3460','#e94560'],
    ][Math.floor(Math.random()*4)];
    const grd = ctx.createLinearGradient(0,0,total,total);
    palette.forEach((c,i) => grd.addColorStop(i/(palette.length-1), c));
    ctx.fillStyle = grd;
    ctx.fillRect(0,0,total,total);
    // add shapes
    for (let i=0;i<12;i++) {
      ctx.save();
      ctx.globalAlpha = 0.12 + Math.random()*0.18;
      ctx.beginPath();
      const cx=Math.random()*total, cy=Math.random()*total, r=30+Math.random()*total*0.4;
      ctx.arc(cx,cy,r,0,Math.PI*2);
      ctx.fillStyle = palette[Math.floor(Math.random()*palette.length)];
      ctx.fill();
      ctx.restore();
    }
  } else if (theme === 'geometric') {
    const bg = ['#0a0a0f','#0f0f1a','#1a0a0a'][Math.floor(Math.random()*3)];
    ctx.fillStyle = bg; ctx.fillRect(0,0,total,total);
    const cols = ['#e8ff45','#ff4d6d','#4dffb8','#ff9f43','#a29bfe','#fd79a8'];
    for (let i=0;i<40;i++) {
      ctx.save();
      ctx.globalAlpha = 0.6+Math.random()*0.4;
      ctx.fillStyle = cols[Math.floor(Math.random()*cols.length)];
      ctx.translate(Math.random()*total, Math.random()*total);
      ctx.rotate(Math.random()*Math.PI);
      const s = 15+Math.random()*60;
      const shape = Math.floor(Math.random()*3);
      ctx.beginPath();
      if (shape===0) { ctx.rect(-s/2,-s/2,s,s); }
      else if(shape===1) { ctx.moveTo(0,-s); ctx.lineTo(s*0.866,s*0.5); ctx.lineTo(-s*0.866,s*0.5); ctx.closePath(); }
      else { ctx.rect(-s/2,-4,s,8); }
      ctx.fill();
      ctx.restore();
    }
  } else if (theme === 'neon') {
    ctx.fillStyle = '#050510'; ctx.fillRect(0,0,total,total);
    const neons = ['#ff0090','#00fff7','#e8ff45','#aa00ff','#ff6600'];
    for (let i=0;i<8;i++) {
      const c = neons[Math.floor(Math.random()*neons.length)];
      ctx.save();
      ctx.strokeStyle = c;
      ctx.shadowColor = c;
      ctx.shadowBlur = 18;
      ctx.lineWidth = 1.5+Math.random()*3;
      ctx.globalAlpha = 0.7+Math.random()*0.3;
      ctx.beginPath();
      const x1=Math.random()*total, y1=Math.random()*total;
      ctx.moveTo(x1,y1);
      for(let j=0;j<4;j++) ctx.lineTo(Math.random()*total, Math.random()*total);
      ctx.stroke();
      ctx.restore();
    }
    for(let i=0;i<20;i++){
      const c = neons[Math.floor(Math.random()*neons.length)];
      ctx.save(); ctx.fillStyle=c; ctx.shadowColor=c; ctx.shadowBlur=12;
      ctx.globalAlpha=0.8;
      const r=2+Math.random()*6;
      ctx.beginPath(); ctx.arc(Math.random()*total,Math.random()*total,r,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  } else { // mosaic
    const palettes = [
      ['#2d6a4f','#40916c','#52b788','#74c69d','#95d5b2'],
      ['#5c4033','#8d6e63','#a1887f','#bcaaa4','#efebe9'],
      ['#1a237e','#283593','#3949ab','#5c6bc0','#7986cb'],
    ][Math.floor(Math.random()*3)];
    const tileSize = total/size;
    for(let r=0;r<size;r++) for(let c=0;c<size;c++){
      ctx.fillStyle = palettes[Math.floor(Math.random()*palettes.length)];
      ctx.fillRect(c*tileSize, r*tileSize, tileSize, tileSize);
      if(Math.random()<0.4){
        ctx.save(); ctx.globalAlpha=0.15;
        ctx.fillStyle='#fff';
        ctx.fillRect(c*tileSize,r*tileSize,tileSize,tileSize);
        ctx.restore();
      }
    }
  }
  return canvas;
}

function sliceImage(sourceCanvas, size) {
  const tileSize = sourceCanvas.width / size;
  const slices = [];
  for (let r=0; r<size; r++) {
    for (let c=0; c<size; c++) {
      const sc = document.createElement('canvas');
      sc.width = tileSize; sc.height = tileSize;
      sc.getContext('2d').drawImage(sourceCanvas, c*tileSize, r*tileSize, tileSize, tileSize, 0, 0, tileSize, tileSize);
      slices.push(sc.toDataURL());
    }
  }
  return slices;
}

// ─── Math Challenge ───────────────────────────────────────────────────
const QUESTIONS = [
  { q: '¿Cuánto es 5 + 3?',           a: 8   },
  { q: '¿Cuánto es 10 - 4?',          a: 6   },
  { q: '¿Cuánto es 3 × 4?',           a: 12  },
  { q: '¿Cuánto es 20 ÷ 5?',          a: 4   },
  { q: '¿Cuánto es 7 + 6?',           a: 13  },
  { q: '¿Cuánto es 15 - 5?',          a: 10  },
  { q: '¿Cuánto es 6 × 2?',           a: 12  },
  { q: '¿Cuánto es 18 ÷ 3?',          a: 6   },
  { q: '¿Cuánto es 9 + 10?',          a: 19  },
  { q: '¿Cuánto es 30 - 12?',         a: 18  },
  { q: '¿Cuánto es 12²?',             a: 144 },
  { q: '¿Cuánto es 7 × 8 + 6?',       a: 62  },
  { q: '¿Cuánto es 100 ÷ 4 + 5?',     a: 30  },
  { q: '¿Cuánto es 15 × 3 - 10?',     a: 35  },
  { q: '¿Cuánto es 9² + 10?',         a: 91  },
  { q: '¿Cuánto es 48 ÷ 6 × 3?',      a: 24  },
  { q: '¿Cuánto es 5³?',              a: 125 },
  { q: '¿Cuánto es 64 ÷ 8 + 12?',     a: 20  },
  { q: '¿Cuánto es 14 × 4 - 6?',      a: 50  },
  { q: '¿Cuánto es 81 ÷ 9 + 7?',      a: 16  },
];

let mathQueue = [];         // shuffled indices pool
let mathCurrentQ = null;    // current question obj
let mathPendingIdx = -1;    // tile index waiting to move
let mathAttempts = 0;
const MAX_ATTEMPTS = 3;

function buildMathQueue() {
  mathQueue = Array.from({length: QUESTIONS.length}, (_,i) => i);
  for(let i=mathQueue.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [mathQueue[i],mathQueue[j]]=[mathQueue[j],mathQueue[i]];
  }
}

function nextQuestion() {
  if(mathQueue.length === 0) buildMathQueue();
  return QUESTIONS[mathQueue.pop()];
}

function askMath(pendingIdx) {
  mathPendingIdx = pendingIdx;
  mathAttempts = 0;
  mathCurrentQ = nextQuestion();

  const qNum = QUESTIONS.length - mathQueue.length;
  document.getElementById('math-question').textContent = mathCurrentQ.q;
  document.getElementById('math-num').textContent = `Pregunta #${qNum} de ${QUESTIONS.length}`;
  document.getElementById('math-prog-bar').style.width = ((qNum-1)/QUESTIONS.length*100)+'%';
  document.getElementById('math-input').value = '';
  document.getElementById('math-feedback').textContent = '';
  document.getElementById('math-feedback').className = 'math-feedback';

  // Render attempt dots
  const dotsEl = document.getElementById('math-attempts');
  dotsEl.innerHTML = '';
  for(let i=0;i<MAX_ATTEMPTS;i++){
    const d = document.createElement('div');
    d.className = 'attempt-dot';
    dotsEl.appendChild(d);
  }

  document.getElementById('math-overlay').classList.add('show');
  setTimeout(() => document.getElementById('math-input').focus(), 100);
}

function checkMath() {
  const input = document.getElementById('math-input');
  const val = parseInt(input.value.trim());
  const fb = document.getElementById('math-feedback');

  if(isNaN(val)) {
    fb.textContent = 'Ingresa un número válido.';
    fb.className = 'math-feedback wrong';
    return;
  }

  if(val === mathCurrentQ.a) {
    fb.textContent = '¡Correcto! 🎉 Movimiento desbloqueado.';
    fb.className = 'math-feedback right';
    setTimeout(() => {
      document.getElementById('math-overlay').classList.remove('show');
      doMove(mathPendingIdx);
      mathPendingIdx = -1;
    }, 600);
  } else {
    mathAttempts++;
    // update dots
    const dots = document.querySelectorAll('.attempt-dot');
    if(dots[mathAttempts-1]) dots[mathAttempts-1].classList.add('used');

    input.classList.add('shake');
    setTimeout(()=>input.classList.remove('shake'), 400);
    input.value = '';

    if(mathAttempts >= MAX_ATTEMPTS) {
      fb.textContent = `❌ La respuesta era ${mathCurrentQ.a}. Intenta de nuevo.`;
      fb.className = 'math-feedback wrong';
      setTimeout(() => {
        // Give a new (different) question as penalty
        mathAttempts = 0;
        mathCurrentQ = nextQuestion();
        const qNum = QUESTIONS.length - mathQueue.length;
        document.getElementById('math-question').textContent = mathCurrentQ.q;
        document.getElementById('math-num').textContent = `Pregunta #${qNum} — ¡Nueva oportunidad!`;
        document.getElementById('math-prog-bar').style.width = ((qNum-1)/QUESTIONS.length*100)+'%';
        document.getElementById('math-input').value = '';
        document.getElementById('math-feedback').textContent = '';
        document.getElementById('math-feedback').className = 'math-feedback';
        const dotsEl = document.getElementById('math-attempts');
        dotsEl.innerHTML = '';
        for(let i=0;i<MAX_ATTEMPTS;i++){
          const d = document.createElement('div');
          d.className = 'attempt-dot';
          dotsEl.appendChild(d);
        }
        document.getElementById('math-input').focus();
      }, 1500);
    } else {
      const left = MAX_ATTEMPTS - mathAttempts;
      fb.textContent = `Incorrecto. Te quedan ${left} intento${left!==1?'s':''}.`;
      fb.className = 'math-feedback wrong';
      input.focus();
    }
  }
}

function cancelMath() {
  document.getElementById('math-overlay').classList.remove('show');
  mathPendingIdx = -1;
  clearSelection();
  selectedIdx = -1;
}

// Allow Enter key to confirm
document.addEventListener('keydown', e => {
  if(e.key === 'Enter' && document.getElementById('math-overlay').classList.contains('show')) {
    checkMath();
  }
  if(e.key === 'Escape' && document.getElementById('math-overlay').classList.contains('show')) {
    cancelMath();
  }
});

buildMathQueue();

// ─── Puzzle Logic ────────────────────────────────────────────────────
function isSolvable(arr, n) {
  let inv = 0;
  const flat = arr.filter(x => x !== n*n-1);
  for(let i=0;i<flat.length;i++) for(let j=i+1;j<flat.length;j++) if(flat[i]>flat[j]) inv++;
  if(n%2===1) return inv%2===0;
  const emptyRow = Math.floor(arr.indexOf(n*n-1) / n);
  return (inv + emptyRow) % 2 === 1;
}

function generateSolvable(n) {
  const arr = Array.from({length:n*n}, (_,i)=>i);
  do { for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } }
  while(!isSolvable(arr,n) || isAlreadySolved(arr,n));
  return arr;
}

function isAlreadySolved(arr, n) {
  return arr.every((v,i)=>v===i);
}

function initPuzzle() {
  N = parseInt(document.getElementById('size-sel').value);
  const theme = document.getElementById('theme-sel').value;
  const ts = TILE_SIZES[N];

  const sourceCanvas = generateImage(theme, N);
  imgData = sliceImage(sourceCanvas, N);

  // Preview
  const prev = document.getElementById('preview-canvas');
  prev.getContext('2d').drawImage(sourceCanvas, 0, 0, prev.width, prev.height);

  tiles = generateSolvable(N);
  emptyIdx = tiles.indexOf(N*N-1);
  moves = 0; solved = false; selectedIdx = -1;
  document.getElementById('moves-val').textContent = '0';

  clearInterval(timerInterval);
  startTime = null;
  document.getElementById('time-val').textContent = '00:00';

  renderBoard(ts);
  updateStats();
}

function shufflePuzzle() {
  if(!imgData) { initPuzzle(); return; }
  tiles = generateSolvable(N);
  emptyIdx = tiles.indexOf(N*N-1);
  moves = 0; solved = false; selectedIdx = -1;
  document.getElementById('moves-val').textContent = '0';
  clearInterval(timerInterval); startTime = null;
  document.getElementById('time-val').textContent = '00:00';
  renderBoard(TILE_SIZES[N]);
  updateStats();
}

function renderBoard(ts) {
  const board = document.getElementById('puzzle-board');
  board.style.setProperty('--tile-size', ts+'px');
  board.style.gridTemplateColumns = `repeat(${N}, ${ts}px)`;
  board.innerHTML = '';

  tiles.forEach((val, idx) => {
    const tile = document.createElement('div');
    tile.className = 'tile' + (val === N*N-1 ? ' empty' : '');
    tile.dataset.idx = idx;

    if (val !== N*N-1) {
      tile.style.backgroundImage = `url(${imgData[val]})`;
      tile.style.backgroundSize = 'cover';
      if(val === idx) tile.classList.add('correct-pos');

      const num = document.createElement('div');
      num.className = 'tile-num';
      num.textContent = val+1;
      tile.appendChild(num);

      tile.addEventListener('click', () => handleClick(idx));
    }
    board.appendChild(tile);
  });
}

function handleClick(idx) {
  if(solved) return;

  // Try to move directly if adjacent to empty → ask math first
  if (canMove(idx)) {
    askMath(idx);
    return;
  }

  // Selection mode for non-adjacent
  if(selectedIdx === idx) {
    selectedIdx = -1;
    clearSelection();
    return;
  }

  if(selectedIdx !== -1 && canMove(selectedIdx)) {
    const prev = selectedIdx;
    selectedIdx = -1;
    clearSelection();
    askMath(prev);
    return;
  }

  selectedIdx = idx;
  clearSelection();
  document.querySelector(`.tile[data-idx="${idx}"]`)?.classList.add('selected');
}

function canMove(idx) {
  const row = Math.floor(idx/N), col = idx%N;
  const er = Math.floor(emptyIdx/N), ec = emptyIdx%N;
  return (Math.abs(row-er)+Math.abs(col-ec)) === 1;
}

function doMove(idx) {
  if(!startTime) {
    startTime = Date.now();
    timerInterval = setInterval(updateTimer, 1000);
  }
  [tiles[idx], tiles[emptyIdx]] = [tiles[emptyIdx], tiles[idx]];
  emptyIdx = idx;
  moves++;
  document.getElementById('moves-val').textContent = moves;
  renderBoard(TILE_SIZES[N]);
  updateStats();

  // animate moved tile (now at emptyIdx... wait, we swapped)
  const movedTile = document.querySelector(`.tile[data-idx="${emptyIdx}"]`);
  if(movedTile) { movedTile.classList.add('move-anim'); setTimeout(()=>movedTile.classList.remove('move-anim'),200); }

  checkWin();
}

function clearSelection() {
  document.querySelectorAll('.tile.selected').forEach(t=>t.classList.remove('selected'));
}

function giveHint() {
  if(solved) return;
  // find first tile not in correct position that can move
  for(let i=0;i<tiles.length;i++){
    if(tiles[i]!==N*N-1 && tiles[i]!==i && canMove(i)){
      const el = document.querySelector(`.tile[data-idx="${i}"]`);
      if(el){ el.classList.add('hint-move'); setTimeout(()=>el.classList.remove('hint-move'),1300); }
      return;
    }
  }
  // fallback: show any movable tile
  for(let i=0;i<tiles.length;i++){
    if(canMove(i)){
      const el = document.querySelector(`.tile[data-idx="${i}"]`);
      if(el){ el.classList.add('hint-move'); setTimeout(()=>el.classList.remove('hint-move'),1300); }
      return;
    }
  }
}

function updateStats() {
  const correct = tiles.filter((v,i)=>v===i && v!==N*N-1).length;
  const total = N*N-1;
  const pct = Math.round(correct/total*100);
  document.getElementById('correct-val').textContent = pct+'%';
  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('progress-text').textContent = `${correct} / ${total}`;
}

function updateTimer() {
  if(!startTime) return;
  const elapsed = Math.floor((Date.now()-startTime)/1000);
  const m = String(Math.floor(elapsed/60)).padStart(2,'0');
  const s = String(elapsed%60).padStart(2,'0');
  document.getElementById('time-val').textContent = `${m}:${s}`;
}

function checkWin() {
  if(tiles.every((v,i)=>v===i)) {
    solved = true;
    clearInterval(timerInterval);
    const elapsed = Math.floor((Date.now()-startTime)/1000);
    const m = String(Math.floor(elapsed/60)).padStart(2,'0');
    const s = String(elapsed%60).padStart(2,'0');
    document.getElementById('win-moves').textContent = moves;
    document.getElementById('win-time').textContent = `${m}:${s}`;
    setTimeout(()=>{
      document.getElementById('win-overlay').classList.add('show');
      launchConfetti();
    }, 300);
  }
}

function launchConfetti() {
  const colors = ['#e8ff45','#ff4d6d','#4dffb8','#ff9f43','#a29bfe'];
  for(let i=0;i<80;i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left:${Math.random()*100}vw;
      top:-10px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${1.5+Math.random()*2}s;
      animation-delay:${Math.random()*0.8}s;
      transform:rotate(${Math.random()*360}deg);
      width:${5+Math.random()*8}px;
      height:${5+Math.random()*8}px;
    `;
    document.body.appendChild(el);
    el.addEventListener('animationend', ()=>el.remove());
  }
}

// Init on load
window.onload = () => initPuzzle();
</script>
